<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SŌF MOJITO TV</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial}
#video{width:100%;height:100%;position:fixed;top:0;left:0;display:none;background:#000}
#menu{padding:50px 10px 0 10px;height:100%;display:flex;flex-direction:column;align-items:center}
.logo{font-size:72px;font-weight:bold;text-align:center;line-height:1}
.logo .sof{color:#8b0000;text-shadow:0 0 10px #ff0000,0 0 20px #8b0000}
.logo .mojito{color:#dc143c;text-shadow:0 0 10px #ff0000,0 0 20px #dc143c}
.logo .tv{color:#ff0000;font-size:32px;vertical-align:top;margin-left:5px;text-shadow:0 0 10px #ff0000}
.adult-link{display:inline-block;margin-bottom:15px}
.adult-link:hover{background:#00ff88;color:#000!important}
#in{font-size:32px;padding:20px;background:transparent;border:none;color:#666;text-align:center;margin-bottom:20px;outline:none;text-shadow:0 0 5px rgba(255,0,0,0.3)}
#in.focused{color:#aaa;text-shadow:0 0 10px rgba(255,0,0,0.5)}
#msg{font-size:20px;padding:15px;color:#8b0000;min-height:30px}
.error{color:#ff0000}
.info{color:#dc143c}
.hidden{display:none}
#qm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;flex-direction:column;justify-content:center;align-items:center}
#qm.show{display:flex}
#qm h2{color:#ff0000;font-size:48px;margin-bottom:40px;text-shadow:0 0 20px #ff0000,0 0 40px #8b0000}
#qm p{color:#8b0000;font-size:24px;padding:15px}
select{font-size:20px;width:100%;padding:15px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;margin-top:20px;height:300px}
option{background:#1a1a1a;color:#aaa;padding:12px}
option:checked,option:focus,option:selected{background:#0066cc;color:#fff}
</style>
</head>
<body>

<video id="video" controls></video>

<div id="qm">
<h2>SŌF CONTROL</h2>
<p>▶ ENTER: siguiente</p>
<p>◀ FLECHA ARRIBA: anterior</p>
<p>⏯ ESPACIO: play/pause</p>
<p>❌ ESC: cerrar</p>
</div>

<div id="menu">
<div class="logo"><span class="sof">SōF</span><span class="mojito"> MoJiTo</span><span class="tv"> TV</span></div>
<div id="in">Escribe el canal...</div>
<button id="more" style="display:none;margin-top:10px;padding:10px 20px;background:#8b0000;border:none;color:#fff;cursor:pointer;">MAS STREAMS (+20)</button>
<div id="msg" class="info">↑↓ navegar | ENTER reproducir</div>
<select id="results" size="10" class="hidden"></select>
</div>

<script src="hls.min.js"></script>
<script>
var BASE=window.location.protocol+'//'+window.location.host;
var API=BASE+'/api/search';
var streams=[], favorites=[], idx=0, txt='', mode='search', page=1, hasMore=false, loading=false;
var elIn=document.getElementById('in'), elSel=document.getElementById('results'), elMsg=document.getElementById('msg'), elMenu=document.getElementById('menu'), elVideo=document.getElementById('video');
var hls=null;

var ADULT_STREAMS=[
    {name:"Adult Swim",url:"http://181.119.86.1:8000/play/a019"},
    {name:"Adult Swim",url:"http://190.60.59.67:8000/play/a0io"},
    {name:"Cartoon Network",url:"http://181.119.86.1:8000/play/a01g"},
    {name:"Nickelodeon",url:"http://45.169.163.237:4000/play/a01c"},
    {name:"HBO",url:"http://38.187.3.110:8000/play/a07z/index.m3u8"},
    {name:"HBO 2",url:"http://45.181.120.65:9087/play/130/index.m3u8"},
    {name:"ESPN",url:"http://38.41.8.1:8000/play/a0t3"},
    {name:"ESPN 2",url:"http://38.41.8.1:8000/play/a0rp"},
    {name:"Fox Sports 1",url:"http://38.41.8.1:8000/play/a0sw"},
    {name:"TNT",url:"http://38.41.8.1:8000/play/a0sv"},
    {name:"Space",url:"http://38.41.8.1:8000/play/a0rm"},
    {name:"AMC",url:"http://38.41.8.1:8000/play/a0t3"},
    {name:"TNT Sports",url:"http://38.41.8.1:8000/play/a0sx"},
    {name:"TyC Sports",url:"http://38.41.8.1:8000/play/a0zx"},
    {name:"Win Sports",url:"http://38.41.8.1:8000/play/a0t3"},
    {name:"Gol TV",url:"http://38.41.8.1:8000/play/a0rp"},
    {name:"MTV",url:"http://38.41.8.1:8000/play/a0sx"},
    {name:"CNN",url:"http://38.41.8.1:8000/play/a0t3"},
    {name:"CNN Espanol",url:"http://38.41.8.1:8000/play/a0rp"},
    {name:"Nat Geo",url:"http://38.41.8.1:8000/play/a0t3"},
    {name:"Discovery Channel",url:"http://38.41.8.1:8000/play/a0rm"},
    {name:"History",url:"http://38.41.8.1:8000/play/a0t7"},
    {name:"Universal Channel",url:"http://38.41.8.1:8000/play/a0t3"},
    {name:"Warner Channel",url:"http://38.41.8.1:8000/play/a0zx"},
    {name:"MOVIES",url:"https://30a-tv.com/feeds/pzaz/30atvmovies.m3u8"},
    {name:"NATIONAL GEOGRAPHIC",url:"https://live-fi.tvkaista.net/national-geographic/live.m3u8?src=freetv"}
];

var asMode=false, asIdx=0;

function log(m,t){elMsg.textContent=m;elMsg.className=t||'info'}

function ql(t){
    if(/1080|4k|uhd/i.test(t))return' [1080p]';
    if(/720|hd/i.test(t))return' [HD]';
    if(/480|sd/i.test(t))return' [SD]';
    return'';
}

function renderIn(){elIn.textContent=txt||'Escribe el canal...';}

function setMode(m){
    mode=m;
    elIn.classList.toggle('focused',m==='search');
    elSel.classList.toggle('hidden',m==='search');
}

function addFavorite(){
    var s=streams[idx];
    if(!s||favorites.some(function(f){return f.url===s.url}))return;
    favorites.push({title:s.title,url:s.url});
    log('★ Guardado: '+s.title.substring(0,20));
}

function showFavorites(){
    mode='favorites';
    elSel.innerHTML='';elSel.classList.remove('hidden');
    if(!favorites.length){log('Sin favoritos');return;}
    favorites.forEach(function(f,i){
        elSel.add(new Option('★ '+f.title.substring(0,60),i));
    });
    idx=0;elSel.selectedIndex=0;
    log(favorites.length+' favoritos');
}

function playStream(startIdx){
    var trial=0, max=5, s;
    function tryNext(){
        if(trial>=max||!(s=streams[startIdx+trial])){
            log('Sin stream válido');
            elVideo.style.display='none';
            elMenu.style.display='flex';
            return;
        }
        log('Probando '+(trial+1)+': '+s.title.substring(0,25));
        elVideo.dataset.idx=startIdx+trial;
        elVideo.src=s.url;
        elVideo.play().then(function(){log('✓ '+s.title.substring(0,30));}).catch(function(){trial++;setTimeout(tryNext,800);});
    }
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.onerror=function(){trial++;setTimeout(tryNext,500);};
    tryNext();
}

function playFav(favIdx){
    var f=favorites[favIdx];
    if(!f)return;
    elVideo.dataset.idx=favIdx;
    elVideo.src=f.url;
    elVideo.style.display='block';
    elMenu.style.display='none';
    elVideo.onerror=function(){
        var n=parseInt(elVideo.dataset.idx)+1;
        if(n<favorites.length){log('Error, siguiente...');setTimeout(function(){playFav(n)},1500);}else{log('Sin opciones');}
    };
    elVideo.play().catch(function(){log('Toca para reproducir');});
}

function buscar(){
    if(!txt.trim())return;
    log('Buscando...');
    elSel.innerHTML='';streams=[];page=1;
    loadPage(1);
}

function loadPage(p){
    if(loading)return;
    loading=true;
    log('Cargando...');
    var x=new XMLHttpRequest();
    x.open('GET',API+'?q='+encodeURIComponent(txt)+'&page='+p,true);
    x.onload=function(){
        loading=false;
        if(x.status===200){
            try{
                var d=JSON.parse(x.responseText);
                showStreams(d.streams||[],d.hasMore,p===1);
                if(p>1){idx=streams.length-d.streams.length;elSel.selectedIndex=idx;elSel.focus();}
            }catch(e){log('Error');}
        }
    };
    x.onerror=function(){loading=false;log('Sin conexion');};
    x.send();
}

function showStreams(data,more,isFirst){
    if(!data||!data.length){log('Sin resultados');return;}
    hasMore=more;
    data.sort(function(a,b){
        var ga=/1080|4k|uhd/i.test(a.title)?3:(/720|hd/i.test(a.title)?2:1);
        var gb=/1080|4k|uhd/i.test(b.title)?3:(/720|hd/i.test(b.title)?2:1);
        return gb-ga;
    });
    if(isFirst){streams=data;idx=-1;elSel.innerHTML='';elSel.classList.remove('hidden');}
    data.forEach(function(s,i){
        var pos=isFirst?i:streams.length;
        elSel.add(new Option((pos+1)+'. '+s.title.substring(0,50)+ql(s.title),pos));
        streams.push(s);
    });
    log(streams.length+' streams'+(hasMore?' - MAS':' - FIN'));
}

document.addEventListener('keydown',function(e){
    var k=e.key;
    if(asMode){
        if(k==='Escape'||k==='Home'||k==='q'||k==='Q'){
            asMode=false;elMenu.style.display='flex';elSel.style.display='none';txt='';renderIn();log('Saliendo de Adult Swim');return;
        }
        if(k==='ArrowRight'||k==='ArrowDown'){
            e.preventDefault();asIdx=(asIdx+1)%ADULT_STREAMS.length;log(ADULT_STREAMS[asIdx].name);return;
        }
        if(k==='ArrowLeft'||k==='ArrowUp'){
            e.preventDefault();asIdx=(asIdx-1+ADULT_STREAMS.length)%ADULT_STREAMS.length;log(ADULT_STREAMS[asIdx].name);return;
        }
        if(k==='Enter'||k===' '){
            e.preventDefault();playAdult(asIdx);return;
        }
        return;
    }
    if(elVideo.style.display==='block'){
        if(k==='Escape'){elVideo.pause();elVideo.src='';if(hls){hls.destroy();hls=null;}elVideo.style.display='none';elMenu.style.display='flex';log('Cerrado');}
        else if(k===' '){e.preventDefault();elVideo.paused?elVideo.play():elVideo.pause();}
        else if(k==='ArrowRight'){e.preventDefault();var n=parseInt(elVideo.dataset.idx||0)+1;n<streams.length?playStream(n):log('Fin lista');}
        else if(k==='ArrowLeft'){e.preventDefault();var p=parseInt(elVideo.dataset.idx||0)-1;p>=0?playStream(p):log('Inicio lista');}
        return;
    }
    if(k==='0'){e.preventDefault();enterAdultSwim();return;}
    if(k==='ArrowDown'){
        e.preventDefault();
        var lim=mode==='search'&&txt.length>0?streams.length-1:favorites.length-1;
        if(idx<lim){idx++;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log((mode==='search'?streams[idx]:favorites[idx]).title.substring(0,40));}
        else if(mode==='search'&&txt.length>0&&hasMore){page++;loadPage(page);log('Cargando mas...');}
    }else if(k==='ArrowUp'){
        e.preventDefault();
        if(idx>0){idx--;elSel.value=idx;elSel.selectedIndex=idx;elSel.focus();log((mode==='search'?streams[idx]:favorites[idx]).title.substring(0,40));}
    }else if(k==='Enter'){
        e.preventDefault();
        if(mode==='favorites'&&favorites[idx])playFav(idx);
        else if(mode==='search'&&txt.length>0&&idx>=0&&streams[idx])playStream(idx);
        else if(mode==='search'){setMode('search');buscar();}
    }else if(k==='Backspace'){txt=txt.slice(0,-1);renderIn();idx=-1;elSel.innerHTML='';}
    else if(k.length===1){txt+=k;renderIn();}
    else if(k==='F1'){e.preventDefault();document.getElementById('qm').classList.toggle('show');}
    else if(k==='f'||k==='F'){if(mode==='search'&&streams[idx])addFavorite();}
    else if(k==='s'||k==='S'){showFavorites();}
    else if(k==='Home'){txt='';renderIn();setMode('search');elSel.innerHTML='';idx=-1;}
    else if(k==='PageDown'){if(hasMore){page++;loadPage(page);}}
    else if(k==='PageUp'){if(page>1){page--;loadPage(page);}}
});

function enterAdultSwim(){
    asMode=true;asIdx=0;
    elSel.innerHTML='';
    ADULT_STREAMS.forEach(function(ch,i){
        elSel.add(new Option((i+1)+'. '+ch.name,i));
    });
    elSel.selectedIndex=0;
    elSel.style.display='block';
    elSel.size=10;
    log('Adult 0 - '+ADULT_STREAMS.length+' canales | ENTER reproducir');
}

function playAdult(idx){
    var ch=ADULT_STREAMS[idx];
    if(!ch)return;
    if(hls){hls.destroy();hls=null;}
    elVideo.style.display='block';
    elMenu.style.display='none';
    log('Reproduciendo: '+ch.name);
    if(ch.url.indexOf('.m3u8')>0&&typeof Hls!=='undefined'){
        hls=new Hls({enableWorker:true,liveSyncDurationCount:3});
        hls.loadSource(ch.url);
        hls.attachMedia(elVideo);
        hls.on(Hls.Events.MANIFEST_PARSED,function(){elVideo.play().catch(function(){log('Error')});});
        hls.on(Hls.Events.ERROR,function(e,data){if(data.fatal){log('Error, cambiando...');nextBackup(ch,idx);}});
    }else{
        elVideo.src=ch.url;
        elVideo.play().catch(function(){log('Error')});
        elVideo.onerror=function(){nextBackup(ch,idx);};
    }
}

function nextBackup(ch,idx){
    var backs={};
    if(backs[ch.name]&&backs[ch.name].length>1){
        var cur=backs[ch.name].indexOf(ch.url);
        if(cur>=0&&backs[ch.name][cur+1]){
            ch.url=backs[ch.name][cur+1];
            setTimeout(function(){playAdult(idx)},1000);
        }else{
            log('Sin fuentes disponibles');
            elVideo.style.display='none';elMenu.style.display='flex';asMode=false;
        }
    }else{
        log('Sin fuentes disponibles');
        elVideo.style.display='none';elMenu.style.display='flex';asMode=false;
    }
}

renderIn();
</script>
</body>
</html>
