<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SŌF MoJiTo TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
#video{width:100%;height:100%;display:none;background:#000}
#menu{flex:1;padding:20px;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.logo{font-size:48px;font-weight:bold;margin-bottom:20px;text-align:center}
.logo span{text-shadow:0 0 20px #ff0000}
.logo .sof{color:#8b0000}
.logo .mojito{color:#dc143c;margin-left:10px}
#search{width:100%;max-width:500px;padding:15px;font-size:24px;border:2px solid #333;border-radius:10px;background:#1a1a1a;color:#fff;text-align:center;outline:none}
#search:focus{border-color:#dc143c;box-shadow:0 0 20px rgba(220,20,60,0.3)}
#msg{min-height:40px;padding:10px;font-size:18px;color:#8b0000;text-align:center}
#results{width:100%;max-width:600px;margin-top:10px;font-size:18px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#fff;display:none;max-height:400px;overflow-y:auto}
#results option{padding:12px;border-bottom:1px solid #333}
#results option:nth-child(even){background:#222}
#controls{padding:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;background:#1a1a1a}
.btn{padding:10px 20px;background:#8b0000;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px}
.btn:hover{background:#a00}
.btn.active{background:#dc143c}
#adult-panel{display:none;padding:20px;background:#222;border-radius:10px;margin-top:20px;width:100%;max-width:600px}
#adult-panel.show{display:block}
#adult-panel h3{color:#dc143c;margin-bottom:15px}
.adult-item{padding:10px;background:#333;margin:5px 0;border-radius:5px;cursor:pointer;display:flex;justify-content:space-between}
.adult-item:hover{background:#444}
</style>
</head>
<body>

<video id="video" controls></video>

<div id="menu">
    <div class="logo">
        <span class="sof">SōF</span><span class="mojito">MoJiTo</span>
    </div>
    
    <input type="text" id="search" placeholder="Escribe el canal..." autofocus>
    
    <div id="msg">Escribe para buscar canales</div>
    
    <select id="results" size="10"></select>
    
    <div id="adult-panel">
        <h3>CANALES ADULTOS (0)</h3>
        <div id="adult-list"></div>
    </div>
</div>

<div id="controls">
    <button class="btn" id="btn-home">HOME</button>
    <button class="btn" id="btn-adult">0 ADULTOS</button>
    <button class="btn" id="btn-play">▶ REPRODUCIR</button>
</div>

<script>
const API = '/api';
const video = document.getElementById('video');
const search = document.getElementById('search');
const results = document.getElementById('results');
const msg = document.getElementById('msg');
const adultPanel = document.getElementById('adult-panel');
const adultList = document.getElementById('adult-list');

let channels = [];
let selected = 0;

function log(t) { msg.textContent = t; }

async function doSearch() {
    const q = search.value.trim();
    if (!q) { results.innerHTML = ''; results.style.display = 'none'; log('Escribe para buscar'); return; }
    
    log('Buscando...');
    try {
        const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
        const data = await r.json();
        channels = data.streams || [];
        
        results.innerHTML = '';
        channels.forEach((ch, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${i + 1}. ${ch.title}`;
            results.appendChild(opt);
        });
        
        results.style.display = 'block';
        selected = 0;
        results.selectedIndex = 0;
        
        log(channels.length ? `${channels.length} canales encontrados` : 'Sin resultados');
    } catch (e) {
        log('Error de conexion');
    }
}

async function loadAdult() {
    try {
        const r = await fetch(`${API}/adult`);
        const data = await r.json();
        adultList.innerHTML = '';
        data.streams.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'adult-item';
            div.textContent = ch.title;
            div.onclick = () => playUrl(ch.url, ch.title);
            adultList.appendChild(div);
        });
        document.querySelector('#adult-panel h3').textContent = `CANALES ADULTOS (${data.streams.length})`;
    } catch (e) { log('Error cargando adultos'); }
}

function playUrl(url, title) {
    video.src = url;
    video.style.display = 'block';
    document.getElementById('menu').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    video.play().catch(() => {});
    log('Reproduciendo: ' + title);
}

function playSelected() {
    if (channels[selected]) {
        playUrl(channels[selected].url, channels[selected].title);
    }
}

function closeVideo() {
    video.pause();
    video.src = '';
    video.style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    log('Cerrado');
}

search.addEventListener('input', () => setTimeout(doSearch, 500));
search.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); if (selected < channels.length - 1) { selected++; results.selectedIndex = selected; } }
    if (e.key === 'ArrowUp') { e.preventDefault(); if (selected > 0) { selected--; results.selectedIndex = selected; } }
    if (e.key === 'Enter') playSelected();
    if (e.key === 'Escape') closeVideo();
});

document.getElementById('btn-home').onclick = () => { search.value = ''; results.innerHTML = ''; results.style.display = 'none'; adultPanel.classList.remove('show'); log('HOME'); };
document.getElementById('btn-adult').onclick = () => { adultPanel.classList.toggle('show'); if (adultPanel.classList.contains('show')) loadAdult(); };
document.getElementById('btn-play').onclick = playSelected;

video.addEventListener('error', () => { log('Error en stream'); closeVideo(); });

loadAdult();
</script>
</body>
</html>
